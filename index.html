      if(!drinkData[drink])drinkData[drink]={};
      if(score==null)delete drinkData[drink][member];else drinkData[drink][member]=score;
      if(Object.keys(drinkData[drink]).length===0)delete drinkData[drink];
      try{localStorage.setItem(LS_DRINK,JSON.stringify(drinkData));}catch(e){}
      store._emit();
    };
    window.addEventListener("storage",function(e){
      if(e.key===LS_KEY){data=loadLS(LS_KEY,{});store._emit();}
      if(e.key===LS_DRINK){drinkData=loadLS(LS_DRINK,{});store._emit();}
    });
    store.ready=Promise.resolve();
    return store;
  }
  function SupabaseStore(url,key){
    var store=makeEmitter({mode:"live"});
    var data={}, drinkData={};
    var sb=window.supabase.createClient(url,key);
    function applyBook(row){if(!data[row.book])data[row.book]={};data[row.book][row.member]=row.score;}
    function applyDrink(row){if(!drinkData[row.drink])drinkData[row.drink]={};drinkData[row.drink][row.member]=row.score;}
    function removeBook(book,member){if(data[book]){delete data[book][member];if(!Object.keys(data[book]).length)delete data[book];}}
    function removeDrink(drink,member){if(drinkData[drink]){delete drinkData[drink][member];if(!Object.keys(drinkData[drink]).length)delete drinkData[drink];}}
    store.getAll=function(){return data;};
    store.getAllDrinks=function(){return drinkData;};
    store.setRating=async function(book,member,score){
      if(score==null)removeBook(book,member);else applyBook({book,member,score});
      store._emit();
      try{if(score==null){await sb.from("ratings").delete().match({book,member});}
      else{await sb.from("ratings").upsert({book,member,score},{onConflict:"book,member"});}}
      catch(e){console.error("Supabase book write failed",e);}
    };
    store.setDrinkRating=async function(drink,member,score){
      if(score==null)removeDrink(drink,member);else applyDrink({drink,member,score});
      store._emit();
      try{if(score==null){await sb.from("drink_ratings").delete().match({drink,member});}
      else{await sb.from("drink_ratings").upsert({drink,member,score},{onConflict:"drink,member"});}}
      catch(e){console.error("Supabase drink write failed",e);}
    };
    store.ready=(async function(){
      var res=await Promise.all([
        sb.from("ratings").select("book,member,score"),
        sb.from("drink_ratings").select("drink,member,score").catch(function(){return {data:[]};})
      ]);
      (res[0].data||[]).forEach(applyBook);
      (res[1].data||[]).forEach(applyDrink);
      sb.channel("mc2-stream")
        .on("postgres_changes",{event:"*",schema:"public",table:"ratings"},function(p){
          if(p.eventType==="DELETE"){var o=p.old||{};removeBook(o.book,o.member);}
          else applyBook(p.new);
          store._emit();
        })
        .on("postgres_changes",{event:"*",schema:"public",table:"drink_ratings"},function(p){
          if(p.eventType==="DELETE"){var o=p.old||{};removeDrink(o.drink,o.member);}
          else applyDrink(p.new);
          store._emit();
        })
        .subscribe();
    })();
    return store;
  }
  var url=(window.SUPABASE_URL||"").trim();
  var key=(window.SUPABASE_ANON_KEY||"").trim();
  var haveCreds=url&&key&&window.supabase&&/^https?:\/\//.test(url);
  window.Store=haveCreds?SupabaseStore(url,key):LocalStore();
})();

(function(){

  function drinkRatingsFor(drink){return (Store.getAllDrinks()[drink])||{};}

  function drinkAvgFor(drink){var v=Object.values(drinkRatingsFor(drink));return v.length?v.reduce(function(a,b){return a+b;},0)/v.length:null;}
  function countFor(book){return Object.keys(ratingsFor(book)).length;}
  function drinkCountFor(drink){return Object.keys(drinkRatingsFor(drink)).length;}
  function yourScore(book){return currentMember?ratingsFor(book)[currentMember]:undefined;}
  function yourDrinkScore(drink){return currentMember?drinkRatingsFor(drink)[currentMember]:undefined;}
  function star5(s){var v=s/2;return Number.isInteger(v)?String(v):v.toFixed(1);}
  function star5avg(s){return (s/2).toFixed(1);}
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

  function starsHTML(cls){
    var s="";for(var i=0;i<5;i++)s+='<span class="star"><span class="empty">★</span><span class="fill">★</span></span>';
    return '<span class="stars '+(cls||"")+'">'+s+"</span>";
  }
  function setFills(el,frac){
    $$(  ".star",el).forEach(function(st,i){var w=Math.max(0,Math.min(1,frac-i))*100;$(".fill",st).style.width=w+"%";});
  }
  function renderStaticStars(frac,cls){
    var wrap=document.createElement("span");wrap.innerHTML=starsHTML(cls);setFills(wrap.firstChild,frac);return wrap.firstChild;
  }

  function buildRateTrack(getScore,setScore){
    var wrap=document.createElement("div");wrap.className="rate";
    var track=document.createElement("div");track.className="track";
    var inner="";for(var i=0;i<5;i++)inner+='<span class="star"><span class="empty">★</span><span class="fill">★</span></span>';
    track.innerHTML=inner;
    var caption=document.createElement("div");caption.className="caption";
    wrap.appendChild(track);wrap.appendChild(caption);
    function paint(sc){setFills(track,(sc||0)/2);}
    function refreshCaption(){
      var ys=getScore();
      if(!currentMember){caption.innerHTML="Pick your name above to rate";}
      else if(ys!=null){
        caption.innerHTML="Your rating · <b>"+star5(ys)+"/5</b><span class='clear'>clear</span>";
        var cl=$(".clear",caption);if(cl)cl.onclick=function(e){e.stopPropagation();setScore(null);};
      }else{caption.innerHTML="Tap to rate";}
    }
    function scoreFromEvent(e){
      var r=track.getBoundingClientRect();
      var cx=e.clientX!=null?e.clientX:(e.touches&&e.touches[0]?e.touches[0].clientX:r.left);
      return Math.max(1,Math.min(10,Math.round(Math.max(0,Math.min(1,(cx-r.left)/r.width))*10)));
    }
    var dragging=false;
    track.addEventListener("pointerdown",function(e){if(!currentMember){flashName();return;}dragging=true;track.setPointerCapture(e.pointerId);setFills(track,scoreFromEvent(e)/2);e.preventDefault();});
    track.addEventListener("pointermove",function(e){if(dragging)setFills(track,scoreFromEvent(e)/2);});
    track.addEventListener("pointerup",function(e){if(dragging){dragging=false;if(!currentMember){flashName();return;}setScore(scoreFromEvent(e));}});
    track.addEventListener("pointercancel",function(){dragging=false;paint(getScore());});
    paint(getScore());refreshCaption();
    wrap._refresh=function(){paint(getScore());refreshCaption();};
    return wrap;
  }

    v.appendChild(row);

      var unrated=MEETINGS.filter(function(x){return yourScore(x.book)==null;});
      if(unrated.length){var nb=document.createElement("div");nb.className="nudge";nb.innerHTML='<div class="t"><b>'+unrated.length+"</b> book"+(unrated.length===1?"":"s")+" you haven\u2019t rated yet.</div><button class='go'>Rate now</button>";$(".go",nb).onclick=function(){openSheet(unrated[unrated.length-1].book);};v.appendChild(nb);}

    var ft=document.createElement("div");ft.className="footer";ft.innerHTML='<div class="est">Mount Comfort Men\u2019s Club</div>Est. 2023 · Fayetteville, AR · Founded by Mike Kaminski';v.appendChild(ft);
  }
